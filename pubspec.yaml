name: commit
description: '将 Git 版本控制理念应用于个人任务管理的跨平台 Flutter 应用'
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # 数据库
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.0

  # 路由
  go_router: ^14.0.0

  # DI
  get_it: ^8.0.0
  injectable: ^2.4.0

  # 本地通知
  flutter_local_notifications: ^17.0.0

  # 文件操作
  path_provider: ^2.1.0
  file_picker: ^8.0.0

  # 工具
  uuid: ^4.0.0
  intl: ^0.19.0
  collection: ^1.18.0

  # UI 组件
  flutter_svg: ^2.0.0

  # 系统功能
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0

  # 桌面端支持
  window_manager: ^0.4.0
  system_tray: ^2.0.0

  # Drift 依赖
  drift_sqflite: ^2.0.0
  sqlite3: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.15.0
  injectable_generator: ^2.6.0

  # 代码规范
  flutter_lints: ^4.0.0
  very_good_analysis: ^5.1.0

  # 测试
  mockito: ^5.4.0
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600

  assets:
    - assets/icons/
    - assets/images/
